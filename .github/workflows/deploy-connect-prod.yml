name: deploy connect to production

on:
  release:
    types: [published]

concurrency:
  group: deploy-connect-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/connect/package-lock.json

      - name: install dependencies
        working-directory: apps/connect
        run: npm ci

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws_role_arn_prod }}
          aws-region: us-east-2

      - name: deploy to production
        working-directory: apps/connect
        run: npm run deploy:prod

      - name: update release notes
        uses: actions/github-script@v7
        with:
          script: |
            const release = context.payload.release;
            const body = release.body || '';
            const deployMessage = '\n\n---\n🚀 **deployed to production**: https://connect.llmvault.dev';
            
            if (!body.includes('deployed to production')) {
              github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                body: body + deployMessage
              });
            }
