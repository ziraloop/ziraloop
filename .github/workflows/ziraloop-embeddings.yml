name: ziraloop-embeddings

on:
  push:
    branches: [main]
    paths:
      - "ziraloop-embeddings/**"
  pull_request:
    branches: [main]
    paths:
      - "ziraloop-embeddings/**"

permissions:
  contents: write

defaults:
  run:
    working-directory: ziraloop-embeddings

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: ziraloop-embeddings/go.sum
      - name: run tests
        run: CGO_ENABLED=1 go test ./... -v -race -count=1
        timeout-minutes: 5

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: ziraloop-embeddings/go.sum

      - name: install cross-compiler
        if: matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          COMMIT=${GITHUB_SHA::7}
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}"

          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
          fi

          go build -ldflags "${LDFLAGS}" -o bin/ziraloop-embeddings-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ziraloop-embeddings-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ziraloop-embeddings/bin/ziraloop-embeddings-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 90

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ziraloop-embeddings-linux-amd64
          path: bin/

      - name: download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ziraloop-embeddings-linux-arm64
          path: bin/

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: embeddings-${{ github.sha }}
          name: ziraloop-embeddings (${{ github.sha }})
          body: |
            Automated build of ziraloop-embeddings from ${{ github.sha }}.

            Binaries:
            - `ziraloop-embeddings-linux-amd64` — for x86_64 sandboxes
            - `ziraloop-embeddings-linux-arm64` — for ARM sandboxes
          files: |
            bin/ziraloop-embeddings-linux-amd64
            bin/ziraloop-embeddings-linux-arm64
          draft: false
          prerelease: false
