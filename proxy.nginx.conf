# MCP server — mcp.llmvault.dev / mcp.dev.llmvault.dev
# Point these domains to the same Railway service as a custom domain.
# Nginx routes by Host header to the internal MCP server on :8081.
server {
    listen 80;
    server_name mcp.llmvault.dev mcp.dev.llmvault.dev;
    server_tokens off;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming — disable all buffering
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;

        # MCP sessions can be long-lived
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# API + LLM proxy — api.llmvault.dev / api.dev.llmvault.dev / everything else
server {
    listen 80 default_server;
    server_name _;
    server_tokens off;

    # Allow large request bodies (image/audio payloads, long prompts)
    client_max_body_size 100m;
    client_body_buffer_size 1m;

    # Proxy all requests to Go API with /v1/proxy prefix
    location / {
        proxy_pass http://127.0.0.1:8080/v1/proxy/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming — disable all buffering
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;

        # Long timeouts for slow models / large generations
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Large response headers (some providers return verbose headers)
        proxy_buffers 8 16k;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 64k;
    }

    # Health check (direct, no proxy)
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
