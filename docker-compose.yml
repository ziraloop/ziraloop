services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llmvault}
      POSTGRES_USER: ${POSTGRES_USER:-llmvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/postgres/02-create-zitadel-db.sh:/docker-entrypoint-initdb.d/02-create-zitadel-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmvault} && psql -U ${POSTGRES_USER:-llmvault} -d zitadel -c 'SELECT 1' >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

  # --- Mailpit (Email testing) ---
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    environment:
      MP_DATA_FILE: /data/mailpit.db
      MP_UI_BIND_ADDR: 0.0.0.0:8025
      MP_SMTP_BIND_ADDR: 0.0.0.0:1025
      # Accept any SMTP auth (or no auth) - required for Zitadel compatibility
      MP_SMTP_AUTH_ACCEPT_ANY: true
      MP_SMTP_AUTH_ALLOW_INSECURE: true
    volumes:
      - mailpitdata:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/livez"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- HashiCorp Vault (KMS for envelope encryption) ---
  vault:
    image: hashicorp/vault:1.18
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: llmvault-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    volumes:
      - ./docker/vault/init.sh:/vault/init.sh:ro
      - vaultdata:/vault/file
    cap_add:
      - IPC_LOCK
    command: >
      sh -c "
        vault server -dev -dev-root-token-id=llmvault-dev-token -dev-listen-address=0.0.0.0:8200 &
        sleep 2 &&
        export VAULT_ADDR=http://localhost:8200 &&
        export VAULT_TOKEN=llmvault-dev-token &&
        /vault/init.sh &&
        wait
      "
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  # --- ZITADEL (Identity & Auth) ---

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.12.1
    user: "0"
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY:?ZITADEL_MASTERKEY is required}"
    environment:
      ZITADEL_PORT: 8080
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNALDOMAIN:-localhost}
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT:-8085}
      ZITADEL_EXTERNALSECURE: false
      ZITADEL_TLS_ENABLED: false

      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_USER:-llmvault}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD:?ZITADEL_DB_PASSWORD is required}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable

      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: false

      # Bootstrap admin machine user with PAT
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: llmvault-admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: LLMVault Admin SA
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/admin.pat

      # Default SMTP configuration (Mailpit)
      # Note: Mailpit accepts any credentials with MP_SMTP_AUTH_ACCEPT_ANY
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_HOST: mailpit:1025
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_USER: mailpit
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_PASSWORD: mailpit
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_TLS: false

      # Login V2 configuration
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: LLMVault Login Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      
      # Enable Login V2 by default
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: true
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: http://${ZITADEL_EXTERNALDOMAIN:-localhost}:${ZITADEL_EXTERNALPORT:-8085}/ui/v2/login/
      
      # OIDC/SAML redirect URLs for Login V2
      ZITADEL_OIDC_DEFAULTLOGINURLV2: http://${ZITADEL_EXTERNALDOMAIN:-localhost}:${ZITADEL_EXTERNALPORT:-8085}/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: http://${ZITADEL_EXTERNALDOMAIN:-localhost}:${ZITADEL_EXTERNALPORT:-8085}/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: http://${ZITADEL_EXTERNALDOMAIN:-localhost}:${ZITADEL_EXTERNALPORT:-8085}/ui/v2/login/login?samlRequest=
    # Port 8080 exposed internally only; nginx proxy routes external traffic
    expose:
      - "8080"
    volumes:
      - ./docker/zitadel/bootstrap:/zitadel/bootstrap:rw
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 5s
      timeout: 30s
      retries: 15
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  zitadel-init:
    image: alpine:3.19
    depends_on:
      zitadel:
        condition: service_healthy
    environment:
      ZITADEL_URL: ${ZITADEL_INTERNAL_URL:-http://zitadel:8080}
      ZITADEL_EXTERNAL_URL: ${ZITADEL_EXTERNAL_URL:-http://localhost:8085}
      ZITADEL_HOST_HEADER: ${ZITADEL_EXTERNALDOMAIN:-localhost}
      ZITADEL_DEV_MODE: ${ZITADEL_DEV_MODE:-true}
      DASHBOARD_REDIRECT_URI: ${DASHBOARD_REDIRECT_URI:-http://localhost:3000/api/auth/callback/zitadel}
      DASHBOARD_LOGOUT_URI: ${DASHBOARD_LOGOUT_URI:-http://localhost:3000}
    volumes:
      - ./docker/zitadel/bootstrap:/zitadel/bootstrap:rw
      - ./docker/zitadel/init.sh:/scripts/init.sh:ro
    entrypoint: /bin/sh
    command: ["/scripts/init.sh"]
    restart: "no"

  # Login V2 UI service
  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.12.1
    environment:
      ZITADEL_API_URL: http://zitadel:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:${ZITADEL_EXTERNALDOMAIN:-localhost}
    volumes:
      - ./docker/zitadel/bootstrap:/zitadel/bootstrap:ro
    depends_on:
      zitadel-init:
        condition: service_completed_successfully
    # Port 3000 exposed internally only; nginx proxy routes external traffic
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ui/v2/login/healthy || wget -qO- http://[::1]:3000/ui/v2/login/healthy"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Nginx reverse proxy to route /ui/v2/login to zitadel-login and rest to zitadel
  zitadel-proxy:
    image: nginx:alpine
    ports:
      - "${ZITADEL_EXTERNALPORT:-8085}:8080"
    volumes:
      - ./docker/nginx/zitadel.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      zitadel:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy

volumes:
  pgdata:
  vaultdata:
  mailpitdata:
