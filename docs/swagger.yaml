host: api.dev.llmvault.dev
info:
  contact: {}
  description: Proxy bridge for LLM API credentials.
  title: LLMVault API
  version: "1.0"
paths:
  /v1/api-keys:
    get:
      description: Returns API keys for the current organization with cursor pagination.
      parameters:
      - description: Max items per page (1-100, default 50)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor from previous response
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.paginatedResponse-internal_handler_apiKeyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
