host: api.dev.llmvault.dev
info:
  contact: {}
  description: Proxy bridge for LLM API credentials.
  title: LLMVault API
  version: "1.0"
paths:
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Changes the authenticated user's password. Revokes all sessions.
      parameters:
      - description: Current and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.statusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /auth/confirm-email:
    post:
      consumes:
      - application/json
      description: Confirms a user's email address using a verification token.
      parameters:
      - description: Confirmation token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.confirmEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.statusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      summary: Confirm email address
      tags:
      - auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset link to the email address if an account
        exists.
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.forgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.statusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      summary: Request password reset
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password.
      parameters:
      - description: Login parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      summary: Log in
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes a refresh token.
      parameters:
      - description: Logout parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.logoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.statusResponse'
      security:
      - BearerAuth: []
      summary: Log out
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the current user and their organization memberships.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.meResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a refresh token for new access and refresh tokens.
      parameters:
      - description: Refresh parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.refreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      summary: Refresh tokens
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account, organization, and sends a confirmation
        email.
      parameters:
      - description: Registration parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      summary: Register a new user
      tags:
      - auth
  /auth/resend-confirmation:
    post:
      consumes:
      - application/json
      description: Sends a new email confirmation link. Rate limited to 1 per 60 seconds.
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.resendConfirmationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.statusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/internal_handler.errorResponse'
      summary: Resend confirmation email
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets a user's password using a reset token. Revokes all sessions.
      parameters:
      - description: Reset token and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.resetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.statusResponse'
        "400":
          description: Bad Request
